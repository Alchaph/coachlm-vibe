name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            artifact: coachlm-linux
            artifact-path: build/bin/coachlm-linux
            build-flags: -tags webkit2_41
          - os: windows-latest
            artifact: coachlm-windows.exe
            artifact-path: build/bin/coachlm-windows.exe
            build-flags: ''
          - os: macos-latest
            artifact: coachlm-macos.zip
            artifact-path: build/bin/coachlm-macos.zip
            build-flags: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        # ldflags inject credentials at build time:
        #   STRAVA_CLIENT_ID      → internal/strava.builtinClientID
        #   STRAVA_CLIENT_SECRET  → internal/strava.builtinClientSecret
        # Add these as GitHub Actions secrets before the first release.
        run: >-
          wails build ${{ matrix.build-flags }}
          -ldflags
          "-X coachlm/internal/strava.builtinClientID=${{ secrets.STRAVA_CLIENT_ID }}
          -X coachlm/internal/strava.builtinClientSecret=${{ secrets.STRAVA_CLIENT_SECRET }}
          -X main.builtinGoogleClientID=${{ secrets.GOOGLE_CLIENT_ID }}"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: mv build/bin/coachlm build/bin/coachlm-linux

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cd build/bin && zip -r coachlm-macos.zip coachlm.app

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: mv build/bin/coachlm.exe build/bin/coachlm-windows.exe

      - name: Sign (macOS)
        if: runner.os == 'macOS' && env.APPLE_SIGNING_CERT != '' && env.APPLE_SIGNING_PASSWORD != '' && env.APPLE_TEAM_ID != ''
        env:
          APPLE_SIGNING_CERT: ${{ secrets.APPLE_SIGNING_CERT }}
          APPLE_SIGNING_PASSWORD: ${{ secrets.APPLE_SIGNING_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: echo "macOS signing placeholder — implement when certificates are configured"

      - name: Sign (Windows)
        if: runner.os == 'Windows' && env.WINDOWS_SIGNING_CERT != '' && env.WINDOWS_SIGNING_PASSWORD != ''
        env:
          WINDOWS_SIGNING_CERT: ${{ secrets.WINDOWS_SIGNING_CERT }}
          WINDOWS_SIGNING_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PASSWORD }}
        run: echo "Windows signing placeholder — implement when certificates are configured"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact-path }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            coachlm-linux
            coachlm-macos.zip
            coachlm-windows.exe
