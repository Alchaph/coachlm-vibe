name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: coachlm-linux
          - os: windows-latest
            artifact: coachlm-windows.exe
          - os: macos-latest
            artifact: coachlm-macos.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: wails build -production -tags webkit2_41

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: mv build/bin/coachlm build/bin/coachlm-linux

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cd build/bin && zip -r coachlm-macos.zip coachlm.app

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: mv build/bin/coachlm.exe build/bin/coachlm-windows.exe

      - name: Sign (macOS)
        if: runner.os == 'macOS' && env.APPLE_SIGNING_CERT != ''
        env:
          APPLE_SIGNING_CERT: ${{ secrets.APPLE_SIGNING_CERT }}
        run: echo "macOS signing placeholder — implement when certificates are configured"

      - name: Sign (Windows)
        if: runner.os == 'Windows' && env.WINDOWS_SIGNING_CERT != ''
        env:
          WINDOWS_SIGNING_CERT: ${{ secrets.WINDOWS_SIGNING_CERT }}
        run: echo "Windows signing placeholder — implement when certificates are configured"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            build/bin/coachlm-linux
            build/bin/coachlm-macos.zip
            build/bin/coachlm-windows.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            coachlm-linux
            coachlm-macos.zip
            coachlm-windows.exe
